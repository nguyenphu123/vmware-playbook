---
# ============================================================
# Playbook: vcenter_info.yml
# Description: Gather vCenter Information with connection pre-check
# ============================================================
- name: Gather vCenter Information
  hosts: localhost
  gather_facts: false
  collections:
    - vmware.vmware

  tasks:

    # -------------------------------------------------------
    # 0. Connection Test (like your curl command)
    # -------------------------------------------------------
    - name: Test vCenter API connectivity and login (like curl)
      ansible.builtin.uri:
        url: "https://{{ vcenter_hostname }}/api/session"
        method: POST
        user: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
        force_basic_auth: yes
        status_code: 201
        timeout: 15
      register: vcenter_session
      delegate_to: localhost
      run_once: true
      ignore_errors: true   # We handle failure nicely below

    - name: Fail if vCenter connection or login failed
      ansible.builtin.fail:
        msg: >
          Failed to connect or login to vCenter.
          - Hostname : {{ vcenter_hostname }}
          - Username : {{ vcenter_username }}
          - Error    : {{ vcenter_session.msg | default(vcenter_session.status) | default('Unknown error') }}
          Tip: Make sure hostname resolves, port 443 is open, and credentials are correct.
      when: vcenter_session.status is not defined or vcenter_session.status != 201

    - name: Connection test successful
      ansible.builtin.debug:
        msg: "✅ Successfully connected and authenticated to vCenter (session ID received)"
      when: vcenter_session.status == 201

    # -------------------------------------------------------
    # 1. vCenter license info
    # -------------------------------------------------------
    - name: Get vCenter license info
      vmware.vmware.license_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
      register: license_info

    - name: Display license info
      ansible.builtin.debug:
        var: license_info

    # -------------------------------------------------------
    # 2. vCenter Appliance system info
    # -------------------------------------------------------
    - name: Get vCenter appliance system info
      vmware.vmware.appliance_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
      register: appliance_info

    - name: Display appliance info
      ansible.builtin.debug:
        var: appliance_info

    # -------------------------------------------------------
    # 3. VMs grouped by clusters
    # -------------------------------------------------------
    - name: Get all VMs grouped by clusters
      vmware.vmware.vm_list_group_by_clusters_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
      register: vm_clusters_info

    - name: Display VMs grouped by cluster
      ansible.builtin.debug:
        var: vm_clusters_info

    # -------------------------------------------------------
    # 4. VM portgroup / network info
    # -------------------------------------------------------
    - name: Get VM portgroup (network) info
      vmware.vmware.vm_portgroup_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
      register: vm_portgroup_info

    - name: Display VM portgroup info
      ansible.builtin.debug:
        var: vm_portgroup_info

    # -------------------------------------------------------
    # 5. Tag categories
    # -------------------------------------------------------
    - name: Get tag categories
      vmware.vmware.tag_categories:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
        state: info
      register: tag_categories_info
      ignore_errors: true

    - name: Display tag categories
      ansible.builtin.debug:
        var: tag_categories_info

    # -------------------------------------------------------
    # 6. Local content library info
    # -------------------------------------------------------
    - name: Get local content library info
      vmware.vmware.local_content_library:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
        state: info
      register: content