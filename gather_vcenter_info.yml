---
- name: Gather vCenter Information
  hosts: localhost
  gather_facts: false
  collections:
    - vmware.vmware

  tasks:

    # -------------------------------------------------------
    # 0. Connection Test (like your successful curl)
    # -------------------------------------------------------
    - name: Test vCenter API connectivity and login
      ansible.builtin.uri:
        url: "https://{{ vcenter_hostname }}/api/session"
        method: POST
        user: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
        force_basic_auth: yes
        status_code: 201
        timeout: 20
      register: vcenter_session
      ignore_errors: true

    - name: Connection test successful
      ansible.builtin.debug:
        msg: "✅ Successfully authenticated to vCenter"
      when: vcenter_session.status == 201

    - name: Fail if connection/login failed
      ansible.builtin.fail:
        msg: "❌ Connection or login failed. Check hostname, credentials, and network."
      when: vcenter_session.status is not defined or vcenter_session.status != 201

    # -------------------------------------------------------
    # 1. License info (requires Global.Licenses privilege)
    # -------------------------------------------------------
    - name: Get vCenter license info
      vmware.vmware.license_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
      register: license_info
      ignore_errors: true

    - name: Display license info (or permission warning)
      ansible.builtin.debug:
        msg: "License info: {{ license_info.msg | default(license_info.licenses | default('Permission denied - Global.Licenses required')) }}"
      when: license_info is defined

    # -------------------------------------------------------
    # 2. vCenter Appliance system info (this should work)
    # -------------------------------------------------------
    - name: Get vCenter appliance system info
      vmware.vmware.appliance_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
      register: appliance_info

    - name: Display appliance info
      ansible.builtin.debug:
        var: appliance_info

    # Add the rest of your tasks here (vm_list_group_by_clusters_info, vm_portgroup_info, etc.)
    # For now, I'll stop at appliance_info. Let me know if you want the full version.

    - name: Print summary
      ansible.builtin.debug:
        msg:
          - "=== vCenter Summary ==="
          - "Host      : {{ vcenter_hostname }}"
          - "Username  : {{ vcenter_username }}"
          - "Appliance : {{ appliance_info.appliance_info | default('N/A') | json_query('[*].version') | default('N/A') }}"