---
- name: Gather vCenter Information
  hosts: localhost
  gather_facts: false
  collections:
    - vmware.vmware

  tasks:

    # -------------------------------------------------------
    # 0. Connection Test (like your curl)
    # -------------------------------------------------------
    - name: Test vCenter API connectivity and login
      ansible.builtin.uri:
        url: "https://{{ vcenter_hostname }}/api/session"
        method: POST
        user: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
        force_basic_auth: yes
        status_code: 201
        timeout: 20
      register: vcenter_session
      ignore_errors: true

    - name: Connection test result
      ansible.builtin.debug:
        msg:
          - "✅ Connection SUCCESS - Session ID received"
          - "Session ID: {{ vcenter_session.json.value | default('N/A') }}"
      when: vcenter_session.status == 201

    - name: Fail with clear message if connection failed
      ansible.builtin.fail:
        msg: |
          ❌ Failed to connect/login to vCenter.
          Hostname   : {{ vcenter_hostname }}
          Username   : {{ vcenter_username }}
          Error      : {{ vcenter_session.msg | default('Unknown') }}
          
          Possible causes:
          1. DNS resolution issue inside AAP container → Use IP address instead (172.16.1.251)
          2. Firewall / network restriction from execution node
          3. Wrong password
      when: vcenter_session.status is not defined or vcenter_session.status != 201

    # -------------------------------------------------------
    # Rest of your tasks (license, appliance_info, etc.)
    # -------------------------------------------------------
    - name: Get vCenter license info
      vmware.vmware.license_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
      register: license_info
      when: vcenter_session.status == 201

    - name: Display license info
      ansible.builtin.debug:
        var: license_info

    - name: Get vCenter appliance system info
      vmware.vmware.appliance_info:
        hostname: "{{ vcenter_hostname }}"
        username: "{{ vcenter_username }}"
        password: "{{ vcenter_password }}"
        validate_certs: "{{ vcenter_validate_certs | default(false) | bool }}"
      register: appliance_info
      when: vcenter_session.status == 201

    - name: Display appliance info
      ansible.builtin.debug:
        var: appliance_info

    # ... (add the remaining tasks: vm_list_group_by_clusters_info, vm_portgroup_info, etc.)

    - name: Print summary
      ansible.builtin.debug:
        msg: "=== vCenter Summary === Host: {{ vcenter_hostname }} | Username: {{ vcenter_username }}"
      when: vcenter_session.status == 201